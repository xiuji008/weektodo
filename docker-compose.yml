services:
  weektodo:
    image: registry.cn-hangzhou.aliyuncs.com/xj_lew/weektodo:latest
    container_name: weektodo
    restart: unless-stopped
    ports:
      - "38080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
